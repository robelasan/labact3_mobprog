name: lasan_advmob
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  http: ^1.5.0
  flutter_screenutil: ^5.9.3
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  assets:
    - assets/
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
      - asset: assets/fonts/Poppins-Regular.ttf
  uses-material-design: true

